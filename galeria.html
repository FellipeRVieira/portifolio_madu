 <script>

    const buttons = document.querySelectorAll(".filtros button");
    const items = document.querySelectorAll(".item");

    function aplicarFiltro(filtro) {

        items.forEach(item => {
            item.classList.toggle("hide", !item.classList.contains(filtro));
        });

    }

    buttons.forEach(btn => {

        btn.addEventListener("click", () => {

            buttons.forEach(b => b.classList.remove("active"));
            btn.classList.add("active");

            aplicarFiltro(btn.dataset.filter);

        });

    });

    // Descobre qual botão iniciou como active
    const botaoInicial = document.querySelector(".filtros button.active");

    if (botaoInicial) {
        aplicarFiltro(botaoInicial.dataset.filter);
    }

</script>
